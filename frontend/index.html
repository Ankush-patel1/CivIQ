<!doctype html>
<html lang="en-IN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- SEO -->
    <title>CivIQ — India's Voter Guide</title>
    <meta name="description" content="CivIQ helps every Indian citizen understand the election process step by step — from voter enrolment to polling day. Free, simple, and beginner-friendly." />
    <meta name="keywords" content="voter registration India, EPIC card, ECI, election commission India, how to vote India, voter ID, polling booth, Lok Sabha, Vidhan Sabha" />
    <meta name="author" content="CivIQ" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://civiq.in" />

    <!-- Open Graph / Social sharing -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://civiq.in" />
    <meta property="og:title" content="CivIQ — India's Interactive Voter Guide" />
    <meta property="og:description" content="Step-by-step election guide for every Indian voter. Know your rights, find your booth, ask the AI assistant." />
    <meta property="og:image" content="/og-image.png" />

    <!-- Twitter card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="CivIQ — India's Voter Guide" />
    <meta name="twitter:description" content="Understand India's election process in simple steps. Free civic assistant for every Indian." />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="theme-color" content="#0b1326" />

    <!-- Preconnect for Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Structured data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "CivIQ",
      "description": "India's interactive civic assistant — voter enrolment, polling booth finder, and AI-powered election Q&A.",
      "url": "https://civiq.in",
      "applicationCategory": "GovernmentService",
      "operatingSystem": "Any",
      "offers": { "@type": "Offer", "price": "0" }
    }
    </script>
  </head>
  <body>
    <noscript>
      <div style="padding:40px;text-align:center;font-family:sans-serif;background:#0b1326;color:#dae2fd;min-height:100vh;display:flex;align-items:center;justify-content:center;">
        <p>CivIQ requires JavaScript to run. Please enable JavaScript in your browser settings.</p>
      </div>
    </noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
